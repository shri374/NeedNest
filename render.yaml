services:
  - type: web
    name: neednest-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate:deploy
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
